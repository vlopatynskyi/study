<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <form id="add-form">
        <input type="text" id="input-todo-task" placeholder="Add new task">
        <button id="add-btn" type="submit">Add</button>
    </form>

     <form id="filter-form">
        <label for="all">
        <input type="radio" name="filter" value="all" checked>
        All
        </label> 

        <label for="active">
        <input type="radio" name="filter" value="active">
        Active
        </label>

        <label for="completed">
        <input type="radio" name="filter" value="completed">
        Completed
        </label>

        <button id="filter-btn">Activate filter</button>
    </form>

    <ol id="todo-list"></ol>

<form id="complete-form">
    
        <label for="complete-task">Type number of your task</label>
        <input type="number" name="complete-task" id="complete-task-input" placeholder="1" min="0" >
         
        <button id="complete-btn" type="submit">Complete Task</button>
</form>

<form id="remove-form">
    
        <label for="remove-task">Type number of task you need to remove</label>
        <input type="number" name="remove-task" id="remove-task-input" placeholder="1" min="0" >
         
        <button id="remove-btn" type="submit">Remove Task</button>
</form>

<button id="clear-completed-btn">Clear Completed</button>
    <script src="main.js"></script>
    <script src="app.js"></script>
</body>
</html>

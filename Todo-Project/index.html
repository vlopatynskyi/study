<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <div class="container">
        
        <form id="add-form">
            <input type="text" id="input-todo-task" placeholder="Add new task" class="input-line" required>
            <button id="add-btn" type="submit" class="btn">Add</button>
        </form>
    
         <form id="filter-form">
            <label for="all">
            <input type="radio" name="filter" value="all" checked>
            All
            </label> 
    
            <label for="active">
            <input type="radio" name="filter" value="active">
            Active
            </label>
    
            <label for="completed">
            <input type="radio" name="filter" value="completed">
            Completed
            </label>
    
            <button id="filter-btn" class="btn">Activate</button>
        </form>
    
        <ol class="list" id="todo-list"></ol>
    
        <button id="clear-completed-btn" class="btn">
            Clear Completed
        </button>
    
    </div>
    <script src="main.js"></script>
    <script src="app.js"></script>
</body>
</html>

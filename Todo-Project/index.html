<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <form id="add-form">
        <input type="text" id="input-todo-task" placeholder="Add new task">
        <button id="add-btn" type="submit">Add</button>
    </form>

    <ol id="todo-list"></ol>
<form id="complete-form">
    
        <label for="complete-task">Type number of your task</label>
        <input type="number" name="complete-task" id="complete-task-input"  min="0" >
         
        <button id="complete-btn" type="submit">Complete Task</button>
</form>
    <script src="main.js"></script>
    <script src="app.js"></script>
</body>
</html>
